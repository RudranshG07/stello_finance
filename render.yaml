services:
  - type: web
    name: sxlm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: STELLAR_NETWORK
        value: mainnet
      - key: STELLAR_RPC_URL
        value: https://mainnet.sorobanrpc.com
      - key: STELLAR_HORIZON_URL
        value: https://horizon.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: "Public Global Stellar Network ; September 2015"
      - key: SXLM_TOKEN_CONTRACT_ID
        value: CCGFHMW3NZD5Z7ATHYHZSEG6ABCJADUHP5HIAWFPR37CP4VGNEDQO7FJ
      - key: STAKING_CONTRACT_ID
        value: ""
      - key: LENDING_CONTRACT_ID
        value: ""
      - key: LP_POOL_CONTRACT_ID
        value: ""
      - key: GOVERNANCE_CONTRACT_ID
        value: ""
      - key: VESTING_CONTRACT_ID
        value: ""
      - key: ADMIN_PUBLIC_KEY
        value: GDWXTIIROGCVBSNQMBJFH6HOWQ4YSRVMKSUS53CH6MP56WSWD6J4VZ5N
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sxlm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sxlm-redis
          type: redis
          property: connectionString

  - type: redis
    name: sxlm-redis
    plan: free
    ipAllowList: []

databases:
  - name: sxlm-db
    databaseName: sxlm_protocol
    user: sxlm
    plan: free
